apiVersion: v1
kind: ConfigMap
metadata:
  name: sequin-config
  labels:
    app.kubernetes.io/name: sequin
    app.kubernetes.io/part-of: openworks
data:
  sequin.yaml: |
    account:
      name: openworks

    users:
      - account: openworks
        email: dev@openworks.local
        password: openworks-dev-password

    databases:
      - name: openworks
        hostname: postgres
        port: 5432
        database: openworks
        username: openworks
        password: changeme
        slot:
          name: openworks_sequin
          create_if_not_exists: true
        publication:
          name: openworks_sequin
          create_if_not_exists: true
          init_sql: "create publication openworks_sequin for table posts, comments, spaces, users, wiki_pages, works, creators, work_aliases"

    sinks:
      - name: posts-search
        database: openworks
        source:
          include_tables:
            - public.posts
        destination:
          type: kafka
          hosts: kafka:9092
          topic: openworks.public.posts
          compression: none
      - name: comments-search
        database: openworks
        source:
          include_tables:
            - public.comments
        destination:
          type: kafka
          hosts: kafka:9092
          topic: openworks.public.comments
          compression: none
      - name: spaces-search
        database: openworks
        source:
          include_tables:
            - public.spaces
        destination:
          type: kafka
          hosts: kafka:9092
          topic: openworks.public.spaces
          compression: none
      - name: users-search
        database: openworks
        source:
          include_tables:
            - public.users
        destination:
          type: kafka
          hosts: kafka:9092
          topic: openworks.public.users
          compression: none
      - name: wiki-pages-search
        database: openworks
        source:
          include_tables:
            - public.wiki_pages
        destination:
          type: kafka
          hosts: kafka:9092
          topic: openworks.public.wiki_pages
          compression: none
      - name: works-search
        database: openworks
        source:
          include_tables:
            - public.works
        destination:
          type: kafka
          hosts: kafka:9092
          topic: openworks.public.works
          compression: none
      - name: creators-search
        database: openworks
        source:
          include_tables:
            - public.creators
        destination:
          type: kafka
          hosts: kafka:9092
          topic: openworks.public.creators
          compression: none
      - name: work-aliases-search
        database: openworks
        source:
          include_tables:
            - public.work_aliases
        destination:
          type: kafka
          hosts: kafka:9092
          topic: openworks.public.work_aliases
          compression: none
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sequin
  labels:
    app.kubernetes.io/name: sequin
    app.kubernetes.io/part-of: openworks
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sequin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sequin
        app.kubernetes.io/part-of: openworks
    spec:
      containers:
        - name: sequin
          image: sequin/sequin:v0.14.6
          ports:
            - containerPort: 7376
              name: http
          env:
            - name: CONFIG_FILE_PATH
              value: /config/sequin.yaml
            - name: PG_HOSTNAME
              value: postgres
            - name: PG_PORT
              value: "5432"
            - name: PG_DATABASE
              value: sequin
            - name: PG_USERNAME
              value: openworks
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: password
            - name: REDIS_URL
              value: redis://redis:6379
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: sequin-secrets
                  key: secret-key-base
            - name: VAULT_KEY
              valueFrom:
                secretKeyRef:
                  name: sequin-secrets
                  key: vault-key
            - name: SERVER_PORT
              value: "7376"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: sequin-config
---
apiVersion: v1
kind: Service
metadata:
  name: sequin
  labels:
    app.kubernetes.io/name: sequin
    app.kubernetes.io/part-of: openworks
spec:
  selector:
    app.kubernetes.io/name: sequin
  ports:
    - port: 7376
      targetPort: http
      name: http
---
apiVersion: v1
kind: Secret
metadata:
  name: sequin-secrets
  labels:
    app.kubernetes.io/name: sequin
    app.kubernetes.io/part-of: openworks
type: Opaque
stringData:
  secret-key-base: changeme-generate-a-real-secret-key-base
  vault-key: changeme-generate-a-real-vault-key
