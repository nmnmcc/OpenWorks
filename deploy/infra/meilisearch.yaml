apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: meilisearch
  labels:
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/part-of: openworks
spec:
  serviceName: meilisearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: meilisearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: meilisearch
        app.kubernetes.io/part-of: openworks
    spec:
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.14
          ports:
            - containerPort: 7700
              name: http
          env:
            - name: MEILI_ENV
              value: production
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: meilisearch-secrets
                  key: master-key
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /meili_data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: meilisearch
  labels:
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/part-of: openworks
spec:
  selector:
    app.kubernetes.io/name: meilisearch
  ports:
    - port: 7700
      targetPort: http
      name: http
---
apiVersion: v1
kind: Secret
metadata:
  name: meilisearch-secrets
  labels:
    app.kubernetes.io/name: meilisearch
    app.kubernetes.io/part-of: openworks
type: Opaque
stringData:
  master-key: changeme
