apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openworks

resources:
  - namespace.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml

configMapGenerator:
  - name: app-config
    literals:
      - PORT=30000
      - HOST=0.0.0.0
      - MEILI_URL=http://meilisearch:7700
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_POSTS_TOPIC=openworks.public.posts
      - S3_ENDPOINT=https://s3.example.com
      - S3_BUCKET=openworks
      - MEDIA_PUBLIC_BASE_URL=https://media.example.com

secretGenerator:
  - name: app-secrets
    literals:
      - DATABASE_URL=postgresql://openworks:changeme@postgres:5432/openworks
      - S3_ACCESS_KEY_ID=changeme
      - S3_SECRET_ACCESS_KEY=changeme
